name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read  # For pulling the repository
  pages: write    # For deploying built pages

concurrency:
  group: 'deploy-pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}